        連假檔期熱門，建議提前 2-3 週預約。旺季可能無法臨時配合，請見諒。
      </AlertBanner>

      <LineBanner onLineClick={onLineClick} />
    </div>
  </div>
);

// ── Fridge Tab ──────────────────────────────────────────
const FridgeTab = ({ onLineClick }) => (
  <div>
    <HeroSection tab="fridge" />
    <div className="cc-body">
      <AlertBanner type="g" icon="💰">
        <strong>統一定價：$800 元／次</strong><br/>
        連續假期不限日期，一律 $800。依詢問時檔期存量為主，請提前透過 LINE 確認。
      </AlertBanner>

      <div className="cc-sh">📦 可租型號一覽</div>
      <hr className="cc-shdiv" />
      <div className="cc-tbl-wrap">
        <table className="cc-tbl">
          <thead>
            <tr><th>品牌・型號</th><th>容量</th><th>重量</th><th>耗電</th></tr>
          </thead>
          <tbody>
            {[
              ['冰虎 MC-20','20L','約 8 kg','約 25W'],
              ['冰虎 TA-35','35L','約 14 kg','約 35W'],
              ['冰虎 T50','50L','約 19 kg','約 50W'],
              ['冰虎 T60','60L','約 22 kg','約 60W'],
              ['艾比酷 LG-D36','36L（雙溫區）','約 15 kg','約 40W'],
            ].map((row, i) => (
              <tr key={i}>{row.map((cell, j) => <td key={j}>{cell}</td>)}</tr>
            ))}
          </tbody>
        </table>
      </div>

      <div className="cc-sh">⚠️ 使用注意</div>
      <hr className="cc-shdiv" />
      <div className="cc-grid">
        <NoticeCard type="r" icon="🚨" title="搬運後必看" items={['靜置 <strong>30 分鐘以上</strong>再開機','保持直立，勿倒置超過 45°','直接開機可能損壞壓縮機']} />
        <NoticeCard type="c" icon="🔌" title="電源設置" items={['使用 110V 接地插座','延長線需 10A 以上','建議與冷氣分開插座']} />
        <NoticeCard type="c" icon="🌡️" title="溫度設定" items={['冷藏：2°C～8°C','冷凍：-10°C～-18°C','避免頻繁開關蓋']} />
        <NoticeCard type="w" icon="⚡" title="用電注意" items={['冷氣＋冰箱合計約 4-6A','勿同時使用電熱水壺','勿同時使用電磁爐']} />
      </div>

      <LineBanner onLineClick={onLineClick} />
    </div>
  </div>
);

// ── App ─────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(() => localStorage.getItem('cc_tab') || 'rental');
  useEffect(() => { localStorage.setItem('cc_tab', tab); }, [tab]);

  const onLineClick = () => window.open('https://lin.ee/8maotVi', '_blank');

  const pages = { rental: RentalTab, wiki: WikiTab, booking: BookingTab, fridge: FridgeTab };
  const Page = pages[tab] || RentalTab;

  return (
    <div id="app-root">
      <Header onLogoClick={() => setTab('rental')} />
      <div className="page-body">
        <Page onLineClick={onLineClick} onTabChange={setTab} />
      </div>
      <BottomNav active={tab} onTabChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
