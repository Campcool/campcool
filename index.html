      /* 浮動社交按鈕樣式 */
      .floating-social-buttons {
        position: fixed;

        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 1000;
      }

        height: 56px;
        border-radius: 50%;

      }

      .ig-button {

      }

      .ig-button:hover {
        filter: brightness(0.9);
      }

      /* 手機版適配 */
      @media (max-width: 768px) {
        .floating-social-buttons {
          right: 12px;
          gap: 12px;
        }

        .social-button {
          width: 48px;
          height: 48px;
          font-size: 24px;
        }
